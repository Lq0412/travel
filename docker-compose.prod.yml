# Production deployment - uses pre-built images from ACR
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  frontend:
    image: ${DOCKER_REGISTRY:-crpi-4dquy2tjlozfjo6n.cn-guangzhou.personal.cr.aliyuncs.com}/${DOCKER_NAMESPACE:-lq_travel}/frontend:${IMAGE_TAG:-latest}
    container_name: travel-frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - travel-network

  backend:
    image: ${DOCKER_REGISTRY:-crpi-4dquy2tjlozfjo6n.cn-guangzhou.personal.cr.aliyuncs.com}/${DOCKER_NAMESPACE:-lq_travel}/backend:${IMAGE_TAG:-latest}
    container_name: travel-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-travel}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-travel}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_AI_DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      AI_SEARCH_TAVILY_API_KEY: ${TAVILY_API_KEY}
      AMAP_KEY: ${AMAP_KEY}
      PEXELS_API_KEY: ${PEXELS_API_KEY}
      COS_CLIENT_HOST: ${COS_CLIENT_HOST}
      COS_CLIENT_REGION: ${COS_CLIENT_REGION}
      COS_CLIENT_BUCKET: ${COS_CLIENT_BUCKET}
      COS_CLIENT_SECRETID: ${COS_CLIENT_SECRETID}
      COS_CLIENT_SECRETKEY: ${COS_CLIENT_SECRETKEY}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-travel}
      RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_VHOST: /
      AI_RAG_ENABLED: ${AI_RAG_ENABLED:-true}
      AI_RAG_MILVUS_ENABLED: ${AI_RAG_MILVUS_ENABLED:-false}
      MILVUS_ENDPOINT: http://milvus:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN}
      MILVUS_DATABASE: ${MILVUS_DATABASE:-default}
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-travel_knowledge}
    restart: unless-stopped
    networks:
      - travel-network

  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4
    container_name: travel-mysql
    command:
      - --mysql-native-password=ON
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-travel}
      MYSQL_USER: ${MYSQL_USER:-travel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./travel_backend/src/main/resources/sql/travel.sql:/docker-entrypoint-initdb.d/01-travel.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    networks:
      - travel-network

  redis:
    image: docker.m.daocloud.io/library/redis:7.4-alpine
    container_name: travel-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - travel-network

  rabbitmq:
    image: docker.m.daocloud.io/library/rabbitmq:4-management
    container_name: travel-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-travel}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped
    networks:
      - travel-network

  etcd:
    image: docker.m.daocloud.io/rancher/mirrored-coreos-etcd:v3.5.9
    container_name: travel-etcd
    command:
      - /usr/local/bin/etcd
      - --name
      - etcd
      - --data-dir
      - /etcd
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://etcd:2379
      - --listen-peer-urls
      - http://0.0.0.0:2380
      - --initial-advertise-peer-urls
      - http://etcd:2380
      - --initial-cluster
      - etcd=http://etcd:2380
      - --initial-cluster-state
      - new
    volumes:
      - etcd-data:/etcd
    restart: unless-stopped
    networks:
      - travel-network

  minio:
    image: docker.m.daocloud.io/minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: travel-minio
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/minio_data
    restart: unless-stopped
    networks:
      - travel-network

  milvus:
    image: docker.m.daocloud.io/milvusdb/milvus:v2.4.17
    container_name: travel-milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      LOG_LEVEL: info
    volumes:
      - milvus-data:/var/lib/milvus
    restart: unless-stopped
    networks:
      - travel-network

networks:
  travel-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
