server:
  port: 8080
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000  # 30 天

spring:
  profiles:
    active: local  # 本地开发环境
  application:
    name: travel_backend
  session:  # 使用 redis 存储 session
    store-type: redis
    timeout: 2592000
  servlet:
    multipart:  # 文件上传配置
      max-file-size: 10MB
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}  # RabbitMQ host
    port: ${RABBITMQ_PORT:5672}  # RabbitMQ port
    username: ${RABBITMQ_USERNAME:guest}  # RabbitMQ username
    password: ${RABBITMQ_PASSWORD:guest}  # RabbitMQ password
    virtual-host: ${RABBITMQ_VHOST:/}  # RabbitMQ virtual host
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false
        prefetch: 5

digital-human:
  python-service-url: http://localhost:8888  # Python数字人服务地址

ai:
  search:
    tavily:
      api-key: ${TAVILY_API_KEY:}
      endpoint: ${TAVILY_ENDPOINT:https://api.tavily.com/search}
  rag:
    enabled: true
    top-k: 6
    snippet-max-length: 280
    milvus:
      enabled: false
      endpoint: ${MILVUS_ENDPOINT:http://127.0.0.1:19530}
      token: ${MILVUS_TOKEN:}
      database: ${MILVUS_DATABASE:default}
      collection: ${MILVUS_COLLECTION:travel_knowledge}
      vector-field: ${MILVUS_VECTOR_FIELD:embedding}
      primary-field: ${MILVUS_PRIMARY_FIELD:id}
      search-timeout-ms: 8000
      nprobe: 16
      auto-init-collection: true
      auto-sync-on-startup: false
      sync-batch-size: 20
      sync-limit-per-table: 300
      startup-init-retry-times: 6
      startup-init-retry-interval-ms: 3000
  cache:
    caffeine:
      max-size: 10000  # Caffeine缓存最大条目数
      expire-minutes: 30  # Caffeine缓存过期时间（分钟）
    redis:
      ttl-minutes: 60  # Redis正常缓存TTL（分钟）
      empty-ttl-seconds: 120  # Redis空值缓存TTL（秒）
      error-ttl-seconds: 60  # Redis错误缓存TTL（秒）
    lock:
      ttl-seconds: 30  # 分布式锁TTL（秒）
      wait-timeout-seconds: 5  # 等待锁超时时间（秒）
  quota:
    enabled: false  # 配额检查开关（开发时可设为false）
    daily-limit: 10000  # 每日默认配额（tokens）
  rate-limit:
    chat:
      limit-per-period: 10  # 聊天接口限流：每周期请求数
      period-seconds: 60  # 限流周期（秒）
    stream:
      limit-per-period: 5  # 流式接口限流
      period-seconds: 60
    agent:
      limit-per-period: 3  # Agent接口限流
      period-seconds: 60
  mq:
    enabled: true  # MQ 改造开关，必要时可关闭回退同步
    retry:
      max-retry: 5
      backoff-ms: 300
    memory-card-enabled: true  # 回忆图是否走 MQ 异步（默认关闭，保持兼容）
    reconcile-interval-ms: 60000  # AiTask 补偿轮询间隔（ms）

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
    db-config:
      column-underline: true
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:/mapper/*.xml

logging:
  level:
    org.apache.ibatis: WARN
    com.baomidou.mybatisplus: WARN

knife4j:
  enable: false
  production: false  # 建议生产环境改为 true 关闭文档
  setting:
    language: zh_CN  # 中文界面

pexels:
  base-url: https://api.pexels.com/v1
  cache-minutes: 30
  api-key: ${PEXELS_API_KEY:}
