version: '3'
services:
  redis:
    image: redis:latest
    container_name: my-redis
    ports:
      - "6379:6379"  # 映射容器内的 Redis 端口到主机
    restart: always
    networks:
      - my-network

  rabbitmq:
    image: "rabbitmq:management"
    container_name: my-rabbitmq
    ports:
      - "5672:5672"  # AMQP 端口
      - "15672:15672"  # RabbitMQ 管理界面
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
    networks:
      - my-network

  mysql:
    image: mysql:8
    container_name: my-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456 # 设置 MySQL 根密码
      MYSQL_DATABASE: travel  # 创建数据库
    ports:
      - "3306:3306"  # 映射容器内的 MySQL 端口到主机
    volumes:
      - mysql-data:/var/lib/mysql  # 持久化 MySQL 数据
    restart: always
    networks:
      - my-network

networks:
  my-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
