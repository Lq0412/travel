services:
  redis:
    image: redis:latest
    container_name: my-redis
    ports:
      - "6379:6379"  # 映射容器内的 Redis 端口到主机
    restart: always
    networks:
      - my-network

  rabbitmq:
    image: "rabbitmq:management"
    container_name: my-rabbitmq
    ports:
      - "5672:5672"  # AMQP 端口
      - "15672:15672"  # RabbitMQ 管理界面
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    restart: always
    networks:
      - my-network

  mysql:
    image: mysql:8
    container_name: my-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456 # 设置 MySQL 根密码
      MYSQL_DATABASE: travel  # 创建数据库
    ports:
      - "3306:3306"  # 映射容器内的 MySQL 端口到主机
    volumes:
      - mysql-data:/var/lib/mysql  # 持久化 MySQL 数据
    restart: always
    networks:
      - my-network

  etcd:
    image: ${ETCD_IMAGE:-docker.m.daocloud.io/rancher/mirrored-coreos-etcd:v3.5.9}
    container_name: my-etcd
    command:
      - /usr/local/bin/etcd
      - --name
      - etcd
      - --data-dir
      - /etcd
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://etcd:2379
      - --listen-peer-urls
      - http://0.0.0.0:2380
      - --initial-advertise-peer-urls
      - http://etcd:2380
      - --initial-cluster
      - etcd=http://etcd:2380
      - --initial-cluster-state
      - new
      - --auto-compaction-mode
      - revision
      - --auto-compaction-retention
      - '1000'
      - --quota-backend-bytes
      - '4294967296'
      - --snapshot-count
      - '50000'
    volumes:
      - etcd-data:/etcd
    restart: always
    networks:
      - my-network

  minio:
    image: ${MINIO_IMAGE:-docker.m.daocloud.io/minio/minio:RELEASE.2024-01-16T16-07-38Z}
    container_name: my-minio
    command: minio server /minio_data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/minio_data
    restart: always
    networks:
      - my-network

  milvus:
    image: ${MILVUS_IMAGE:-docker.m.daocloud.io/milvusdb/milvus:v2.4.17}
    container_name: my-milvus
    command: ["milvus", "run", "standalone"]
    depends_on:
      - etcd
      - minio
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      LOG_LEVEL: info
    ports:
      - "19530:19530"  # Milvus gRPC/SDK 端口
      - "9091:9091"    # Milvus 健康检查与指标端口
    volumes:
      - milvus-data:/var/lib/milvus
    restart: always
    networks:
      - my-network

networks:
  my-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  etcd-data:
    driver: local
  minio-data:
    driver: local
  milvus-data:
    driver: local
